<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LWK Platform Blueprint</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0A0A0F;
      color: #E8E8F0;
    }

    .container {
      max-width: 960px;
      margin: auto;
      padding: 28px 20px;
    }

    .header {
      background: linear-gradient(135deg, #0F0F1A, #1A1030, #0F1A2A);
      border-bottom: 1px solid #2A2A3A;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 20px;
    }

    .tab {
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      color: #6B7280;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: #A78BFA;
      border-bottom: 2px solid #A78BFA;
    }

    .card {
      background: #12121E;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #1E1E2E;
    }

    .phase {
      margin-bottom: 10px;
      border-radius: 12px;
      overflow: hidden;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      cursor: pointer;
    }

    .phase-body {
      display: none;
      padding: 10px 20px;
    }

    .task {
      font-size: 13px;
      margin: 6px 0;
      color: #C4C4D4;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    @media(max-width: 768px) {
      .grid-2, .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-block;
      margin: 3px;
    }

  </style>
</head>

<body>

<div class="header">
  <div class="container">
    <h2>🚀 Learn with Keerthi — LWK Platform</h2>
    <p style="color:#6B7280;">Full Stack E-Learning Blueprint</p>

    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="container" id="content"></div>

<script>
const PHASES = [
  {
    id:1,title:"Foundation",weeks:"Week 1–2",color:"#6C63FF",
    tasks:["Initialize Turborepo","Setup PostgreSQL","JWT Auth","Google OAuth","Role middleware","Next.js setup","Express backend"]
  },
  {
    id:2,title:"Core Platform",weeks:"Week 3–5",color:"#00C9A7",
    tasks:["Course CRUD","Lessons management","Mux video upload","S3 docs","Video player","Enrollment","Catalog"]
  }
];

const STACK = [
  {layer:"Frontend",items:["Next.js","Tailwind","Zustand"],color:"#6C63FF"},
  {layer:"Backend",items:["Node.js","Express"],color:"#00C9A7"}
];

const ROLES = [
  {role:"Student",features:["Enroll","Watch","Quiz","Track"]},
  {role:"Mentor",features:["Create","Upload","Analytics"]},
  {role:"Admin",features:["Manage users","Payments","Analytics"]}
];

const COSTS = [
  {service:"Supabase",cost:"Free → $25"},
  {service:"Vercel",cost:"Free → $20"}
];

const tabs = [
  {id:"roadmap",label:"📍 Roadmap"},
  {id:"stack",label:"🛠 Stack"},
  {id:"roles",label:"👥 Roles"},
  {id:"costs",label:"💰 Costs"}
];

let activeTab = "roadmap";

function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = tabs.map(t=>`
    <div class="tab ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">
      ${t.label}
    </div>
  `).join("");
}

function switchTab(id){
  activeTab = id;
  renderTabs();
  renderContent();
}

function renderContent(){
  const el = document.getElementById("content");

  if(activeTab==="roadmap"){
    el.innerHTML = PHASES.map(p=>`
      <div class="phase card">
        <div class="phase-header" onclick="togglePhase(${p.id})">
          <strong>${p.title}</strong> (${p.weeks})
        </div>
        <div class="phase-body" id="phase-${p.id}">
          ${p.tasks.map(t=>`<div class="task">• ${t}</div>`).join("")}
        </div>
      </div>
    `).join("");
  }

  if(activeTab==="stack"){
    el.innerHTML = `
      <div class="grid grid-2">
        ${STACK.map(s=>`
          <div class="card">
            <h4>${s.layer}</h4>
            ${s.items.map(i=>`<span class="badge">${i}</span>`).join("")}
          </div>
        `).join("")}
      </div>
    `;
  }

  if(activeTab==="roles"){
    el.innerHTML = `
      <div class="grid grid-3">
        ${ROLES.map(r=>`
          <div class="card">
            <h4>${r.role}</h4>
            ${r.features.map(f=>`<div class="task">• ${f}</div>`).join("")}
          </div>
        `).join("")}
      </div>
    `;
  }

  if(activeTab==="costs"){
    el.innerHTML = COSTS.map(c=>`
      <div class="card" style="margin-bottom:10px;">
        ${c.service} — <b>${c.cost}</b>
      </div>
    `).join("");
  }
}

function togglePhase(id){
  const el = document.getElementById("phase-"+id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

renderTabs();
renderContent();
</script>

</body>
</html>
